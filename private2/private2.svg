    <g id="Card-2">
        <text id="title" xml:space="preserve"><tspan x="233" y="881" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">The number of pages in this book is</tspan><tspan x="233" y="1054" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">exactly infinite. No page is the first</tspan><tspan font-family="Helvetica" font-size="144" fill="#ffffff" xml:space="preserve">;</tspan><tspan x="233" y="1231" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">none is the last. If you are looking at</tspan><tspan x="233" y="1404" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">a page, it is gone once you turn it. I</tspan><tspan x="233" y="1577" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">have hidden it in the basement</tspan><tspan font-family="Helvetica" font-size="144" fill="#ffffff" xml:space="preserve">;</tspan><tspan font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve"> I try</tspan><tspan x="233" y="1754" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">not to remember how far from the</tspan><tspan x="233" y="1927" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">door.</tspan></text>
    </g>
