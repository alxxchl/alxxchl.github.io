        <text id="title" xml:space="preserve"><tspan x="158" y="2620" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">The manuscript concerning Dr. Yu Tsun, former</tspan><tspan x="158" y="2740" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">professor at the Hochschule at Tsingtao, provides an</tspan><tspan x="158" y="2860" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">official account of the murder of Stephen Albert. The</tspan><tspan x="158" y="2980" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">delay in the mission was attributed by authorities to a</tspan><tspan x="158" y="3100" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">heavy rainstorm.</tspan></text>
