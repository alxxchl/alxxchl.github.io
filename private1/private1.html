<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My truth</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .center-content {
            width: 600px;
            max-width: 80%;
            height: auto;
            object-fit: contain; 
        }

        .bottom-right-btn {
            position: fixed;
            bottom: 30px;
            right: 40px;
            z-index: 20;
            opacity: 1; 
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .bottom-right-btn img {
            width: 60px;
            border-radius: 50%;
            background-color: #fff; 
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            transition: transform 0.2s ease;
            display: block;
        }

        .bottom-right-btn img:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <img src="private1.svg" alt="The number of pages..." class="center-content">

    <a href="../index.html" class="bottom-right-btn">
        <img src="light_wht.png" alt="Next">
    </a>

</body>
</html>
