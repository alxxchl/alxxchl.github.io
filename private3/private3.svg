    <g id="Card-3">
        <text id="title" xml:space="preserve"><tspan x="233" y="798" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">I realized that the book was</tspan><tspan x="233" y="971" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">monstrous. It did not matter that I,</tspan><tspan x="233" y="1144" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">who saw it with my eyes and held it</tspan><tspan x="233" y="1317" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">with my hands, was no less</tspan><tspan x="233" y="1490" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">monstrous than the book. I felt it</tspan><tspan x="233" y="1663" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">was a nightmare thing, an obscene</tspan><tspan x="233" y="1836" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">thing that defiled and corrupted</tspan><tspan x="233" y="2009" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">reality.</tspan></text>
