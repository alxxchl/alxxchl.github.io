        <text id="content" xml:space="preserve"><tspan x="158" y="335" font-family="Test Family VF" font-size="220" font-weight="700" fill="#000000" xml:space="preserve">Hermit Occupies</tspan><tspan x="158" y="600" font-family="Test Family VF" font-size="220" font-weight="700" fill="#000000" xml:space="preserve">Circular Ruins for</tspan><tspan x="158" y="865" font-family="Helvetica" font-size="220" font-weight="700" fill="#000000" xml:space="preserve">"</tspan><tspan font-family="Test Family VF" font-size="220" font-weight="700" fill="#000000" xml:space="preserve">Psychological Project</tspan><tspan font-family="Helvetica" font-size="220" font-weight="700" fill="#000000" xml:space="preserve">"</tspan></text>
        <text id="title" xml:space="preserve"><tspan x="158" y="2614" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">A stranger has taken residence in the ruins of the</tspan><tspan x="158" y="2734" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">ancient fire temple. He is reportedly engaged in an</tspan><tspan x="158" y="2854" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">exhaustive mental exercise aimed at </tspan><tspan font-family="Helvetica" font-size="100" fill="#000000" xml:space="preserve">“</tspan><tspan font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">dreaming a man</tspan><tspan x="158" y="2977" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">with minute integrity</tspan><tspan font-family="Helvetica" font-size="100" fill="#000000" xml:space="preserve">”</tspan><tspan font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve"> and inserting him into the</tspan><tspan x="158" y="3100" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">physical world.</tspan></text>
