        <text id="title" xml:space="preserve"><tspan x="233" y="883" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">I did it because I sensed that the</tspan><tspan x="233" y="1056" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">Chief held in contempt those of my</tspan><tspan x="233" y="1229" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">race. I wanted to prove to him that a</tspan><tspan x="233" y="1402" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">yellow man could save his armies. I</tspan><tspan x="233" y="1575" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">have carried out my plan</tspan><tspan font-family="Helvetica" font-size="144" fill="#ffffff" xml:space="preserve">;</tspan><tspan font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve"> the secret</tspan><tspan x="233" y="1752" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">name of the city to be attacked is</tspan><tspan x="233" y="1925" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">Albert.</tspan></text>
