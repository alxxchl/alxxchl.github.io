        <text id="content" xml:space="preserve"><tspan x="158" y="335" font-family="Test Family VF" font-size="220" font-weight="700" fill="#000000" xml:space="preserve">Anomalous Physical</tspan><tspan x="158" y="600" font-family="Test Family VF" font-size="220" font-weight="700" fill="#000000" xml:space="preserve">Properties of </tspan><tspan font-family="Helvetica" font-size="220" font-weight="700" fill="#000000" xml:space="preserve">"</tspan><tspan font-family="Test Family VF" font-size="220" font-weight="700" fill="#000000" xml:space="preserve">Sand</tspan><tspan font-family="Helvetica" font-size="220" font-weight="700" fill="#000000" xml:space="preserve">"</tspan><tspan x="158" y="870" font-family="Test Family VF" font-size="220" font-weight="700" fill="#000000" xml:space="preserve">Manuscript</tspan></text>
        <text id="title" xml:space="preserve"><tspan x="158" y="2617" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">Preliminary examination of the artifact reveals a</tspan><tspan x="158" y="2737" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">defiance of standard pagination. Attempts to locate the</tspan><tspan x="158" y="2857" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">first page failed</tspan><tspan font-family="Helvetica" font-size="100" fill="#000000" xml:space="preserve">;</tspan><tspan font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve"> regardless of the precision of the</tspan><tspan x="158" y="2980" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">handler, several pages always appear between the</tspan><tspan x="158" y="3100" font-family="Test Family VF" font-size="100" fill="#000000" xml:space="preserve">thumb and the cover.</tspan></text>
