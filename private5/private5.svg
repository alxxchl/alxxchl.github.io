    <g id="Card-5">
        <text id="title" xml:space="preserve"><tspan x="233" y="883" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">He walked into the shreds of flame.</tspan><tspan x="233" y="1056" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">But they did not bite into his flesh</tspan><tspan font-family="Helvetica" font-size="144" fill="#ffffff" xml:space="preserve">;</tspan><tspan x="233" y="1233" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">they caressed him without heat.</tspan><tspan x="233" y="1406" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">With relief, with humiliation, with</tspan><tspan x="233" y="1579" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">terror, he understood that he too</tspan><tspan x="233" y="1752" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">was a mere appearance, dreamt by</tspan><tspan x="233" y="1925" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">another.</tspan></text>
    </g>
