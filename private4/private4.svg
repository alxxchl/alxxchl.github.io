    <g id="Card-4">
        <text id="title" xml:space="preserve"><tspan x="233" y="794" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">The dreamed one awoke. The</tspan><tspan x="233" y="967" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">dreamer feared his son might</tspan><tspan x="233" y="1140" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">discover he was a mere phantom, a</tspan><tspan x="233" y="1313" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">projection of another man</tspan><tspan font-family="Helvetica" font-size="144" fill="#ffffff" xml:space="preserve">'</tspan><tspan font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">s dream.</tspan><tspan x="233" y="1490" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">To be not a man, but the projection</tspan><tspan x="233" y="1663" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">of another man</tspan><tspan font-family="Helvetica" font-size="144" fill="#ffffff" xml:space="preserve">'</tspan><tspan font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">s dream</tspan><tspan font-family="Helvetica" font-size="144" fill="#ffffff" xml:space="preserve">—</tspan><tspan font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">what</tspan><tspan x="233" y="1840" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">incomparable humiliation, what</tspan><tspan x="233" y="2013" font-family="Test Family VF" font-size="144" fill="#ffffff" xml:space="preserve">vertigo</tspan><tspan font-family="Helvetica" font-size="144" fill="#ffffff" xml:space="preserve">!</tspan></text>
    </g>
